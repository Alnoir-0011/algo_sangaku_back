name: ECS deploy

on:
  pull_request:
    branches: [main]
    types: [closed]

  workflow_dispatch:

permissions:
  id-token: write   # OIDC トークン取得に必要
  contents: read

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # OIDC で AWS 認証 (長期クレデンシャル不要)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ap-northeast-1

      # ECR ログイン
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Rails イメージをビルド & push
      - name: Build and push Rails image
        env:
          ECR_RAILS_URL: ${{ secrets.ECR_RAILS_URL }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_SHA="${IMAGE_TAG::7}"
          docker build --platform linux/arm64 --build-arg RAILS_ENV=production -t "$ECR_RAILS_URL:latest" -t "$ECR_RAILS_URL:$SHORT_SHA" .
          docker push "$ECR_RAILS_URL:latest"
          docker push "$ECR_RAILS_URL:$SHORT_SHA"

      # nginx イメージをビルド & push
      - name: Build and push nginx image
        env:
          ECR_NGINX_URL: ${{ secrets.ECR_NGINX_URL }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          SHORT_SHA="${IMAGE_TAG::7}"
          docker build --platform linux/arm64 -f nginx_docker_prod/Dockerfile -t "$ECR_NGINX_URL:latest" -t "$ECR_NGINX_URL:$SHORT_SHA" nginx_docker_prod/
          docker push "$ECR_NGINX_URL:latest"
          docker push "$ECR_NGINX_URL:$SHORT_SHA"

      # 新しいイメージタグを含むタスク定義リビジョンを登録
      - name: Register new ECS task definition
        id: register-task-def
        env:
          ECR_RAILS_URL: ${{ secrets.ECR_RAILS_URL }}
          ECR_NGINX_URL: ${{ secrets.ECR_NGINX_URL }}
          IMAGE_TAG: ${{ github.sha }}
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER_NAME }}
          ECS_SERVICE: ${{ secrets.ECS_SERVICE_NAME }}
          TASK_FAMILY: ${{ secrets.ECS_TASK_FAMILY }}
        run: |
          SHORT_SHA="${IMAGE_TAG::7}"

          # 現在のタスク定義を取得
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --query 'taskDefinition' \
            --output json)

          # コンテナ名の存在確認（名前が変わった場合に無音でスキップされるのを防ぐ）
          for name in web queue nginx; do
            count=$(echo "$TASK_DEF" | jq --arg n "$name" '[.containerDefinitions[] | select(.name == $n)] | length')
            if [ "$count" -eq 0 ]; then
              echo "ERROR: container '$name' not found in task definition" >&2
              exit 1
            fi
          done

          # イメージタグを新しいコミット SHA に書き換え
          NEW_TASK_DEF=$(echo "$TASK_DEF" | \
            jq --arg rails "$ECR_RAILS_URL:$SHORT_SHA" \
               --arg nginx "$ECR_NGINX_URL:$SHORT_SHA" \
            '(.containerDefinitions[] | select(.name == "web")  | .image) |= $rails |
             (.containerDefinitions[] | select(.name == "queue") | .image) |= $rails |
             (.containerDefinitions[] | select(.name == "nginx") | .image) |= $nginx |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                 .compatibilities, .registeredAt, .registeredBy)')

          # 新しいリビジョンを登録
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task_def_arn=$NEW_TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      # ECS サービスを新しいタスク定義でデプロイ
      - name: Deploy to ECS
        env:
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER_NAME }}
          ECS_SERVICE: ${{ secrets.ECS_SERVICE_NAME }}
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.register-task-def.outputs.task_def_arn }}" \
            --force-new-deployment

          echo "Waiting for service to stabilize..."
          # デフォルトの wait は最大 10 分 (40回 × 15秒) のため、最大 20 分のカスタムポーリングに変更
          TIMEOUT=1200
          INTERVAL=15
          ELAPSED=0
          until [ "$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$ECS_SERVICE" \
              --query 'length(services[0].deployments)' \
              --output text)" -eq 1 ]; do
            if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
              echo "ERROR: service did not stabilize within ${TIMEOUT}s" >&2
              exit 1
            fi
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "Deploy succeeded."

      # 古いタスク定義リビジョンを deregister（直近 3 件を残す）
      - name: Deregister old task definition revisions
        env:
          TASK_FAMILY: ${{ secrets.ECS_TASK_FAMILY }}
          KEEP: 3
        run: |
          REVISIONS=$(aws ecs list-task-definitions \
            --family-prefix "$TASK_FAMILY" \
            --sort ASC \
            --query 'taskDefinitionArns' \
            --output json | jq -r '.[]')

          TOTAL=$(echo "$REVISIONS" | wc -l | tr -d ' ')
          DELETE_COUNT=$(( TOTAL - KEEP ))

          if [ "$DELETE_COUNT" -le 0 ]; then
            echo "Nothing to deregister (total=$TOTAL, keep=$KEEP)."
            exit 0
          fi

          echo "$REVISIONS" | head -n "$DELETE_COUNT" | while read -r arn; do
            echo "Deregistering: $arn"
            aws ecs deregister-task-definition --task-definition "$arn" --query 'taskDefinition.taskDefinitionArn' --output text
          done
