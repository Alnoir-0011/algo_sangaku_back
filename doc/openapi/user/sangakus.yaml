              example:
                data:
                  id: '37'
                  type: sangaku
                  attributes:
                    title: test_title
                    description: test_description
                    source: puts 'Hello world'
                    difficulty: easy
                    inputs: []
                    author_name: test nickname
                  relationships:
                    user:
                      data:
                        id: '37'
                        type: user
                    shrine:
                      data:
    patch:
      summary: update
      tags:
      - Api::V1::User::Sangaku
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        example: 38
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sangaku:
                  type: object
                  properties:
                    title:
                      type: string
                    description:
                      type: string
                    source:
                      type: string
                    difficulty:
                      type: string
                  required:
