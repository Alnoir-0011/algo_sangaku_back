---
openapi: 3.0.3
info:
  title: Algo Sangaku Documentation
  version: 1.0.0
servers: []
paths:
  "/api/v1/user/sangakus":
    get:
      summary: index
      tags:
      - Api::V1::User::Sangaku
      responses:
        '200':
          description: return search result in json format
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                        attributes:
                          type: object
                          properties:
                            title:
                              type: string
                            description:
                              type: string
                            source:
                              type: string
                            difficulty:
                              type: string
                            inputs:
                              type: array
                              items: {}
                            author_name:
                              type: string
                          required:
                          - title
                          - description
                          - source
                          - difficulty
                          - inputs
                          - author_name
                        relationships:
                          type: object
                          properties:
                            user:
                              type: object
                              properties:
                                data:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    type:
                                      type: string
                                  required:
                                  - id
                                  - type
                              required:
                              - data
                            shrine:
                              type: object
                              properties:
                                data:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    type:
                                      type: string
                                  required:
                                  - id
                                  - type
                                  nullable: true
                              required:
                              - data
                          required:
                          - user
                          - shrine
                      required:
                      - id
                      - type
                      - attributes
                      - relationships
                required:
                - data
              example:
                data:
                - id: '33'
                  type: sangaku
                  attributes:
                    title: test_title
                    description: test_description
                    source: puts 'Hello world'
                    difficulty: easy
                    inputs: []
                    author_name: test nickname
                  relationships:
                    user:
                      data:
                        id: '34'
                        type: user
                    shrine:
                      data:
                        id: '12'
                        type: shrine
      parameters:
      - name: shrine_id
        in: query
        required: false
        schema:
          type: string
        example: any
      - name: title
        in: query
        required: false
        schema:
          type: string
        example: another
    post:
      summary: create
      tags:
      - Api::V1::User::Sangaku
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sangaku:
                  type: object
                  properties:
                    title:
                      type: string
                    description:
                      type: string
                    source:
                      type: string
                    difficulty:
                      type: string
                  required:
                  - title
                  - description
                  - source
                  - difficulty
                fixed_inputs:
                  type: array
                  items:
                    type: string
              required:
              - sangaku
              - fixed_inputs
            example:
              sangaku:
                title: test_title
                description: test_description
                source: puts 'Hello world'
                difficulty: easy
              fixed_inputs:
              - test_input_1
      responses:
        '200':
          description: success to create sangaku
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                      attributes:
                        type: object
                        properties:
                          title:
                            type: string
                          description:
                            type: string
                          source:
                            type: string
                          difficulty:
                            type: string
                          inputs:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: integer
                                content:
                                  type: string
                              required:
                              - id
                              - content
                          author_name:
                            type: string
                        required:
                        - title
                        - description
                        - source
                        - difficulty
                        - inputs
                        - author_name
                      relationships:
                        type: object
                        properties:
                          user:
                            type: object
                            properties:
                              data:
                                type: object
                                properties:
                                  id:
                                    type: string
                                  type:
                                    type: string
                                required:
                                - id
                                - type
                            required:
                            - data
                          shrine:
                            type: object
                            properties:
                              data:
                                nullable: true
                            required:
                            - data
                        required:
                        - user
                        - shrine
                    required:
                    - id
                    - type
                    - attributes
                    - relationships
                required:
                - data
              example:
                data:
                  id: '36'
                  type: sangaku
                  attributes:
                    title: test_title
                    description: test_description
                    source: puts 'Hello world'
                    difficulty: easy
                    inputs:
                    - id: 3
                      content: test_input_1
                    author_name: test nickname
                  relationships:
                    user:
                      data:
                        id: '36'
                        type: user
                    shrine:
                      data:
  "/api/v1/user/sangakus/generate_source":
    post:
      summary: generate_source
      tags:
      - Api::V1::User::Sangaku
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
              required:
              - description
            example:
              description: 1からnまでの合計を計算して出力してください
      responses:
        '200':
          description: calls OpenAI API with description
          content:
            application/json:
              schema:
                type: object
                properties:
                  source:
                    type: string
                required:
                - source
              example:
                source: |-
                  # 対応言語: Ruby
                  n = gets.chomp.to_i
                  puts (1..n).sum
  "/api/v1/user/sangakus/{id}":
    delete:
      summary: destroy
      tags:
      - Api::V1::User::Sangaku
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        example: 40
      responses:
        '200':
          description: return sangaku in json format
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                      attributes:
                        type: object
                        properties:
                          title:
                            type: string
                          description:
                            type: string
                          source:
                            type: string
                          difficulty:
                            type: string
                          inputs:
                            type: array
                            items: {}
                          author_name:
                            type: string
                        required:
                        - title
                        - description
                        - source
                        - difficulty
                        - inputs
                        - author_name
                      relationships:
                        type: object
                        properties:
                          user:
                            type: object
                            properties:
                              data:
                                type: object
                                properties:
                                  id:
                                    type: string
                                  type:
                                    type: string
                                required:
                                - id
                                - type
                            required:
                            - data
                          shrine:
                            type: object
                            properties:
                              data:
                                nullable: true
                            required:
                            - data
                        required:
                        - user
                        - shrine
                    required:
                    - id
                    - type
                    - attributes
                    - relationships
                required:
                - data
              example:
                data:
                  id: '40'
                  type: sangaku
                  attributes:
                    title: test_title
                    description: test_description
                    source: puts 'Hello world'
                    difficulty: easy
                    inputs: []
                    author_name: test nickname
                  relationships:
                    user:
                      data:
                        id: '42'
                        type: user
                    shrine:
                      data:
    get:
      summary: show
      tags:
      - Api::V1::User::Sangaku
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        example: 37
      responses:
        '200':
          description: return sangaku in json formata
          content:
            application/json:
              schema:
