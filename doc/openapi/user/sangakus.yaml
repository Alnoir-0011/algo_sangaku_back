---
openapi: 3.0.3
info:
  title: Algo Sangaku Documentation
  version: 1.0.0
servers: []
paths:
  "/api/v1/user/sangakus":
    get:
      summary: index
      tags:
      - Api::V1::User::Sangaku
      responses:
        '200':
          description: return search result in json format
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                        attributes:
                          type: object
                          properties:
                            title:
                              type: string
                            description:
                              type: string
                            source:
                              type: string
                            difficulty:
                              type: string
                            inputs:
                              type: array
                              items: {}
                            author_name:
                              type: string
                          required:
                          - title
                          - description
                          - source
                          - difficulty
                          - inputs
                          - author_name
                        relationships:
                          type: object
                          properties:
                            user:
                              type: object
                              properties:
                                data:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    type:
                                      type: string
                                  required:
                                  - id
                                  - type
                              required:
                              - data
                            shrine:
                              type: object
                              properties:
                                data:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    type:
                                      type: string
                                  required:
                                  - id
                                  - type
                                  nullable: true
                              required:
                              - data
                          required:
                          - user
                          - shrine
                      required:
                      - id
                      - type
                      - attributes
                      - relationships
                required:
                - data
              example:
                data:
                - id: '116'
                  type: sangaku
                  attributes:
                    title: test_title
                    description: test_description
                    source: puts 'Hello world'
                    difficulty: easy
                    inputs: []
                    author_name: test nickname
                  relationships:
                    user:
                      data:
                        id: '240'
                        type: user
                    shrine:
                      data:
                        id: '47'
                        type: shrine
      parameters:
      - name: shrine_id
        in: query
        required: false
        schema:
          oneOf:
          - type: string
          - type: integer
        example: any
      - name: title
        in: query
        required: false
        schema:
          type: string
        example: another
    post:
      summary: create
      tags:
      - Api::V1::User::Sangaku
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sangaku:
                  type: object
                  properties:
                    title:
                      type: string
                    description:
                      type: string
                    source:
                      type: string
                    difficulty:
                      type: string
                  required:
                  - title
                  - description
                  - source
                  - difficulty
                fixed_inputs:
                  type: array
                  items:
                    type: string
              required:
              - sangaku
              - fixed_inputs
            example:
              sangaku:
                title: test_title
                description: test_description
                source: puts 'Hello world'
                difficulty: easy
              fixed_inputs:
              - test_input_1
      responses:
        '200':
          description: success to create sangaku
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                      attributes:
                        type: object
                        properties:
                          title:
                            type: string
                          description:
                            type: string
                          source:
                            type: string
                          difficulty:
                            type: string
                          inputs:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: integer
                                content:
                                  type: string
                              required:
                              - id
                              - content
                          author_name:
                            type: string
                        required:
                        - title
                        - description
                        - source
                        - difficulty
                        - inputs
                        - author_name
                      relationships:
                        type: object
                        properties:
                          user:
                            type: object
                            properties:
                              data:
                                type: object
                                properties:
                                  id:
                                    type: string
                                  type:
                                    type: string
                                required:
                                - id
                                - type
                            required:
                            - data
                          shrine:
                            type: object
                            properties:
                              data:
                                nullable: true
                            required:
                            - data
                        required:
                        - user
                        - shrine
                    required:
                    - id
                    - type
                    - attributes
                    - relationships
                required:
                - data
              example:
                data:
                  id: '119'
                  type: sangaku
                  attributes:
                    title: test_title
                    description: test_description
                    source: puts 'Hello world'
                    difficulty: easy
                    inputs:
                    - id: 12
                      content: test_input_1
                    author_name: test nickname
                  relationships:
                    user:
                      data:
                        id: '242'
                        type: user
                    shrine:
                      data:
  "/api/v1/user/sangakus/generate_source":
    post:
      summary: generate_source
      tags:
      - Api::V1::User::Sangaku
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
              required:
              - description
            example:
              description: 1からnまでの合計を計算して出力してください
      responses:
        '200':
          description: calls OpenAI API with wrapped description
          content:
            application/json:
              schema:
                type: object
                properties:
                  source:
                    type: string
                  usage:
                    type: object
                    properties:
                      used:
                        type: integer
                      limit:
                        type: integer
                      remaining:
                        type: integer
                      reset_at:
                        type: string
                    required:
                    - used
                    - limit
                    - remaining
                    - reset_at
                required:
                - source
              example:
                source: |-
                  # 対応言語: Ruby
                  n = gets.chomp.to_i
                  puts (1..n).sum
                usage:
                  used: 1
                  limit: 5
                  remaining: 4
                  reset_at: '2026-04-12T03:00:00+09:00'
  "/api/v1/user/sangakus/generate_source_usage":
    get:
      summary: generate_source_usage
      tags:
      - Api::V1::User::Sangaku
      responses:
        '200':
          description: does not count other users' logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  used:
                    type: integer
                  limit:
                    type: integer
                  remaining:
                    type: integer
                  reset_at:
                    type: string
                required:
                - used
                - limit
                - remaining
                - reset_at
              example:
                used: 0
                limit: 5
                remaining: 5
                reset_at: '2026-04-12T03:00:00+09:00'
  "/api/v1/user/sangakus/{id}":
    delete:
