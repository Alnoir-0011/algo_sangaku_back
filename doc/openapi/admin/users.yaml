---
openapi: 3.0.3
info:
  title: Algo Sangaku Documentation
  version: 1.0.0
servers: []
paths:
  "/api/v1/admin/users":
    get:
      summary: index
      tags:
      - Api::V1::Admin::User
      responses:
        '200':
          description: returns users in descending order when sort=desc
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                        attributes:
                          type: object
                          properties:
                            name:
                              type: string
                            email:
                              type: string
                            nickname:
                              type: string
                            role:
                              type: string
                            created_at:
                              type: string
                            sangaku_count:
                              type: integer
                            answer_count:
                              type: integer
                          required:
                          - name
                          - email
                          - nickname
                          - role
                          - created_at
                          - sangaku_count
                          - answer_count
                      required:
                      - id
                      - type
                      - attributes
                required:
                - data
              example:
                data:
                - id: '877'
                  type: user
                  attributes:
                    name: test user
                    email: user_18@example.com
                    nickname: test nickname
                    role: general
                    created_at: '2026-06-23T16:18:51.659+09:00'
                    sangaku_count: 0
                    answer_count: 0
                - id: '876'
                  type: user
                  attributes:
                    name: test user
                    email: user_17@example.com
                    nickname: test nickname
                    role: admin
                    created_at: '2026-06-23T16:18:51.657+09:00'
                    sangaku_count: 0
                    answer_count: 0
                - id: '879'
                  type: user
                  attributes:
                    name: test user
                    email: user_20@example.com
                    nickname: test nickname
                    role: general
                    created_at: '2026-06-22T16:18:51.662+09:00'
                    sangaku_count: 0
                    answer_count: 0
                - id: '878'
                  type: user
                  attributes:
                    name: test user
                    email: user_19@example.com
                    nickname: test nickname
                    role: general
                    created_at: '2026-06-21T16:18:51.660+09:00'
                    sangaku_count: 0
                    answer_count: 0
        '401':
          description: returns 401
          content:
            text/plain:
              schema:
                type: string
              example: 'HTTP Token: Access denied.

                '
        '403':
          description: returns 403
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items: {}
                required:
                - message
                - errors
              example:
                message: Forbidden
                errors: []
      parameters:
      - name: query
        in: query
        required: false
        schema:
          type: string
        example: search_target@
      - name: sort
        in: query
        required: false
        schema:
          type: string
        example: desc
  "/api/v1/admin/users/{id}":
    get:
      summary: show
      tags:
      - Api::V1::Admin::User
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        example: 895
      responses:
        '200':
          description: returns 200 with user attributes
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                      attributes:
                        type: object
                        properties:
                          name:
                            type: string
                          email:
                            type: string
                          nickname:
                            type: string
                          role:
                            type: string
                          created_at:
                            type: string
                          sangaku_count:
                            type: integer
                          answer_count:
                            type: integer
                        required:
                        - name
                        - email
                        - nickname
                        - role
                        - created_at
                        - sangaku_count
                        - answer_count
                    required:
                    - id
                    - type
                    - attributes
                required:
                - data
              example:
                data:
                  id: '889'
                  type: user
                  attributes:
                    name: test user
                    email: user_30@example.com
                    nickname: test nickname
                    role: general
                    created_at: '2026-06-23T16:18:51.714+09:00'
                    sangaku_count: 0
                    answer_count: 0
        '401':
          description: returns 401
          content:
            text/plain:
              schema:
                type: string
              example: 'HTTP Token: Access denied.

                '
        '403':
          description: returns 403
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items: {}
                required:
                - message
                - errors
              example:
                message: Forbidden
                errors: []
    patch:
      summary: update
      tags:
      - Api::V1::Admin::User
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        example: 916
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    role:
                      type: string
                    name:
                      type: string
                    email:
                      type: string
                  required:
                  - role
              required:
              - user
            example:
              user:
                role: admin
                name: hacked
                email: hacked@example.com
      responses:
        '200':
          description: does not change name or email even if passed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                      attributes:
                        type: object
                        properties:
                          name:
                            type: string
                          email:
                            type: string
                          nickname:
                            type: string
                          role:
                            type: string
                          created_at:
                            type: string
                          sangaku_count:
                            type: integer
                          answer_count:
                            type: integer
                        required:
                        - name
                        - email
                        - nickname
                        - role
                        - created_at
                        - sangaku_count
                        - answer_count
                    required:
                    - id
                    - type
                    - attributes
                required:
                - data
              example:
                data:
                  id: '904'
                  type: user
                  attributes:
                    name: test user
                    email: user_45@example.com
                    nickname: test nickname
                    role: admin
                    created_at: '2026-06-23T16:18:51.814+09:00'
                    sangaku_count: 0
                    answer_count: 0
        '401':
          description: returns 401
          content:
            text/plain:
              schema:
                type: string
              example: 'HTTP Token: Access denied.

                '
        '403':
          description: returns 403
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: array
                    items: {}
                required:
                - message
                - errors
              example:
                message: Forbidden
                errors: []
